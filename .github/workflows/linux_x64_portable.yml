name: desktop-linux-portable

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  TOOLS_CACHE_VERSION: v2
  YT_DLP_LINUX_URL: https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp_linux
  FFMPEG_LINUX_URL: https://github.com/yt-dlp/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-linux64-gpl.tar.xz

jobs:
  build-linux-portable:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Cache tools (yt-dlp/ffmpeg)
        uses: actions/cache@v5
        with:
          path: |
            dist-bin
            ffmpeg-unpacked
          key: tools-${{ runner.os }}-${{ env.TOOLS_CACHE_VERSION }}

      - name: Download yt-dlp (linux x64)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "dist-bin/yt-dlp" ]; then
            echo "yt-dlp cache hit: dist-bin/yt-dlp"
            exit 0
          fi
          mkdir -p dist-bin
          curl -L "$YT_DLP_LINUX_URL" -o dist-bin/yt-dlp
          chmod +x dist-bin/yt-dlp

      - name: Download FFmpeg (linux x64)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "dist-bin/ffmpeg" ]; then
            echo "ffmpeg cache hit: dist-bin/ffmpeg"
            exit 0
          fi
          mkdir -p ffmpeg-unpacked dist-bin
          curl -L "$FFMPEG_LINUX_URL" -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz -C ffmpeg-unpacked
          ffmpeg_path=$(find ffmpeg-unpacked -type f -name ffmpeg | head -n 1)
          ffprobe_path=$(find ffmpeg-unpacked -type f -name ffprobe | head -n 1)
          if [ -z "$ffmpeg_path" ]; then
            echo "ffmpeg not found in extracted archive"
            exit 1
          fi
          cp "$ffmpeg_path" dist-bin/ffmpeg
          chmod +x dist-bin/ffmpeg
          if [ -n "$ffprobe_path" ]; then
            cp "$ffprobe_path" dist-bin/ffprobe
            chmod +x dist-bin/ffprobe
          fi

      - name: Build Lite installers (Linux)
        shell: bash
        run: |
          ./gradlew :desktop:createReleaseDistributable --stacktrace
          ./gradlew :desktop:packageReleaseDistributionForCurrentOS --stacktrace
          
          mkdir -p dist-installers-lite
          cp desktop/build/compose/binaries/main-release/deb/*.deb dist-installers-lite/ || true
          cp desktop/build/compose/binaries/main-release/rpm/*.rpm dist-installers-lite/ || true

      - name: Inject tools for Full version
        shell: bash
        run: |
          mkdir -p desktop/appResources/linux
          cp dist-bin/* desktop/appResources/linux/ || true
          rm -rf desktop/build/compose/binaries desktop/build/compose/tmp

      - name: Build Full installers and portable (Linux)
        shell: bash
        run: |
          ./gradlew :desktop:createReleaseDistributable --stacktrace
          ./gradlew :desktop:packageReleaseDistributionForCurrentOS --stacktrace
          ./gradlew :desktop:packageUberJarForCurrentOS --stacktrace
          
          mkdir -p dist-installers-full
          cp desktop/build/compose/binaries/main-release/deb/*.deb dist-installers-full/ || true
          cp desktop/build/compose/binaries/main-release/rpm/*.rpm dist-installers-full/ || true

      - name: Prepare Full, Lite, Min distributions (Linux)
        shell: bash
        run: |
          set -euo pipefail
          workspace="$GITHUB_WORKSPACE"
          desktop_build="$workspace/desktop/build"
          if [ ! -d "$desktop_build" ]; then
            echo "Build directory not found: $desktop_build"
            exit 1
          fi

          # Locate app root
          binaries_root="$desktop_build/compose/binaries"
          if [ ! -d "$binaries_root" ]; then
            binaries_root=$(find "$desktop_build" -type d -name binaries | grep -m1 "compose/binaries" || true)
          fi
          if [ -z "$binaries_root" ] || [ ! -d "$binaries_root" ]; then
            echo "Compose binaries path not found under: $desktop_build"
            exit 1
          fi

          dist_root=$(find "$binaries_root" -type d -name app -path "*/compose/binaries/*" | head -n 1 || true)
          if [ -z "$dist_root" ] || [ ! -d "$dist_root" ]; then
            echo "Cannot locate Linux distribution root (expected */compose/binaries/*/app)"
            exit 1
          fi

          app_root=$(find "$dist_root" -mindepth 1 -maxdepth 2 -type d | while read -r d; do
            if [ -d "$d/bin" ] && [ -d "$d/lib" ]; then
              launcher_candidate=$(find "$d/bin" -maxdepth 1 -type f -executable ! -name '*.so' ! -name 'yt-dlp' ! -name 'ffmpeg' ! -name 'ffprobe' | head -n 1 || true)
              if [ -n "$launcher_candidate" ]; then
                echo "$d"
                break
              fi
            fi
          done)

          if [ -z "$app_root" ]; then
            echo "Cannot locate Linux app root (expected a directory containing bin/ and lib/ with an executable launcher in bin/)"
            exit 1
          fi

          echo "Resolved app root: $app_root"

          # Portable
          mkdir -p "$workspace/dist-portable"
          cp -r "$app_root" "$workspace/dist-portable/app"
          echo "PORTABLE_DIR=$workspace/dist-portable/app" >> "$GITHUB_ENV"

      - name: Upload Portable Full artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-portable-linux-x64-full
          path: ${{ env.PORTABLE_DIR }}

      - name: Upload Lite DEB Installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-installer-linux-x64-lite-deb
          path: dist-installers-lite/*.deb

      - name: Upload Full DEB Installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-installer-linux-x64-full-deb
          path: dist-installers-full/*.deb

      - name: Upload Lite RPM Installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-installer-linux-x64-lite-rpm
          path: dist-installers-lite/*.rpm

      - name: Upload Full RPM Installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-installer-linux-x64-full-rpm
          path: dist-installers-full/*.rpm
