name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version number, e.g. 1.2.3
        required: true
        type: string
      release_type:
        description: Release type
        required: true
        default: stable
        type: choice
        options:
          - stable
          - prerelease
  release:
    types:
      - published

permissions:
  contents: write
  actions: read

jobs:
  publish-release:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.release.body || '', '<!-- manual-release -->') }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
            version="${version#v}"
            if [ "${{ github.event.release.prerelease }}" = "true" ]; then
              release_type="prerelease"
            else
              release_type="stable"
            fi
          else
            version="${{ inputs.version }}"
            release_type="${{ inputs.release_type }}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_type=${release_type}" >> "$GITHUB_OUTPUT"

      - name: Resolve latest successful workflow runs
        id: resolve_runs
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function findLatestSuccessfulRun(workflowFile) {
              const res = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowFile,
                branch: "main",
                status: "completed",
                per_page: 50,
              });

              const run = res.data.workflow_runs.find((workflowRun) => workflowRun.conclusion === "success");
              if (!run) {
                throw new Error(`No successful run found for ${workflowFile} on branch main`);
              }

              core.info(`Selected ${workflowFile} run: ${run.id} (${run.html_url})`);
              return String(run.id);
            }

            async function findArtifactId(runId, artifactName) {
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner,
                repo,
                run_id: Number(runId),
                per_page: 100,
              });

              const artifact = artifacts.data.artifacts.find((a) => a.name === artifactName && !a.expired);
              if (!artifact) {
                throw new Error(`Artifact '${artifactName}' not found (or expired) in run ${runId}`);
              }

              core.info(`Selected artifact ${artifactName}: ${artifact.id}`);
              return String(artifact.id);
            }

            const linuxRunId = await findLatestSuccessfulRun("linux_x64_portable.yml");
            const windowsRunId = await findLatestSuccessfulRun("windows_x64_portable.yml");
            const macosRunId = await findLatestSuccessfulRun("macos_x64_portable.yml");
            const linuxArtifactId = await findArtifactId(linuxRunId, "desktop-portable-linux-x64");
            const windowsArtifactId = await findArtifactId(windowsRunId, "desktop-portable-win-x64");
            const macosArtifactId = await findArtifactId(macosRunId, "desktop-portable-macos");

            core.setOutput("linux_run_id", linuxRunId);
            core.setOutput("windows_run_id", windowsRunId);
            core.setOutput("macos_run_id", macosRunId);
            core.setOutput("linux_artifact_id", linuxArtifactId);
            core.setOutput("windows_artifact_id", windowsArtifactId);
            core.setOutput("macos_artifact_id", macosArtifactId);

      - name: Download raw artifact zips (no repack)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release-assets

          curl -L \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${{ steps.resolve_runs.outputs.linux_artifact_id }}/zip" \
            -o "release-assets/seal-desktop-linux-x64-portable-v${{ steps.release_meta.outputs.version }}-${{ steps.release_meta.outputs.release_type }}.zip"

          curl -L \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${{ steps.resolve_runs.outputs.windows_artifact_id }}/zip" \
            -o "release-assets/seal-desktop-windows-x64-portable-v${{ steps.release_meta.outputs.version }}-${{ steps.release_meta.outputs.release_type }}.zip"

          curl -L \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${{ steps.resolve_runs.outputs.macos_artifact_id }}/zip" \
            -o "release-assets/seal-desktop-macos-x64-portable-v${{ steps.release_meta.outputs.version }}-${{ steps.release_meta.outputs.release_type }}.zip"

      - name: Publish to GitHub Release (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.release_meta.outputs.version }}
          name: v${{ steps.release_meta.outputs.version }}
          prerelease: ${{ steps.release_meta.outputs.release_type == 'prerelease' }}
          make_latest: ${{ steps.release_meta.outputs.release_type == 'stable' }}
          body: |
            <!-- manual-release -->
          generate_release_notes: true
          files: |
            release-assets/*.zip

      - name: Upload assets to existing release (release event)
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.release_meta.outputs.version }}
          prerelease: ${{ steps.release_meta.outputs.release_type == 'prerelease' }}
          make_latest: ${{ steps.release_meta.outputs.release_type == 'stable' }}
          files: |
            release-assets/*.zip
