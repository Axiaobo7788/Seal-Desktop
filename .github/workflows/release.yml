name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version number, e.g. 1.2.3
        required: true
        type: string
      release_type:
        description: Release type
        required: true
        default: stable
        type: choice
        options:
          - stable
          - prerelease
  release:
    types:
      - published

permissions:
  contents: write
  actions: read

jobs:
  publish-release:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.release.body || '', '<!-- manual-release -->') }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            version="${{ github.event.release.tag_name }}"
            version="${version#v}"
            if [ "${{ github.event.release.prerelease }}" = "true" ]; then
              release_type="prerelease"
            else
              release_type="stable"
            fi
          else
            version="${{ inputs.version }}"
            release_type="${{ inputs.release_type }}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "release_type=${release_type}" >> "$GITHUB_OUTPUT"

      - name: Resolve latest successful workflow runs
        id: resolve_runs
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function findLatestSuccessfulRun(workflowFile) {
              const res = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowFile,
                branch: "main",
                status: "completed",
                per_page: 50,
              });

              const run = res.data.workflow_runs.find((workflowRun) => workflowRun.conclusion === "success");
              if (!run) {
                throw new Error(`No successful run found for ${workflowFile} on branch main`);
              }

              core.info(`Selected ${workflowFile} run: ${run.id} (${run.html_url})`);
              return String(run.id);
            }

            async function findArtifactId(runId, artifactName) {
              const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
                owner,
                repo,
                run_id: Number(runId),
                per_page: 100,
              });

              const artifact = artifacts.data.artifacts.find((a) => a.name === artifactName && !a.expired);
              if (!artifact) {
                throw new Error(`Artifact '${artifactName}' not found (or expired) in run ${runId}`);
              }

              core.info(`Selected artifact ${artifactName}: ${artifact.id}`);
              return String(artifact.id);
            }

            const linuxRunId = await findLatestSuccessfulRun("linux_x64_portable.yml");
            const windowsRunId = await findLatestSuccessfulRun("windows_x64_portable.yml");
            const macosRunId = await findLatestSuccessfulRun("macos_portable.yml");

            async function safeFindArtifactId(runId, artifactName) {
              try { return await findArtifactId(runId, artifactName); } catch (e) { return null; }
            }

            const artifactsToFind = [
              { runId: linuxRunId, name: "desktop-portable-linux-x64-full", out: "linux_portable_full" },
              { runId: windowsRunId, name: "desktop-portable-win-x64-full", out: "win_portable_full" },
              { runId: macosRunId, name: "desktop-portable-macos-x64-full", out: "mac_x64_portable_full" },
              { runId: macosRunId, name: "desktop-portable-macos-arm64-full", out: "mac_arm64_portable_full" },
              { runId: linuxRunId, name: "desktop-installer-linux-x64-lite-deb", out: "linux_lite_deb" },
              { runId: linuxRunId, name: "desktop-installer-linux-x64-full-deb", out: "linux_full_deb" },
              { runId: linuxRunId, name: "desktop-installer-linux-x64-lite-rpm", out: "linux_lite_rpm" },
              { runId: linuxRunId, name: "desktop-installer-linux-x64-full-rpm", out: "linux_full_rpm" },
              { runId: windowsRunId, name: "desktop-installer-win-x64-lite-exe", out: "win_lite_exe" },
              { runId: windowsRunId, name: "desktop-installer-win-x64-full-exe", out: "win_full_exe" },
              { runId: macosRunId, name: "desktop-installer-macos-x64-lite-pkg", out: "mac_x64_lite_pkg" },
              { runId: macosRunId, name: "desktop-installer-macos-x64-full-pkg", out: "mac_x64_full_pkg" },
              { runId: macosRunId, name: "desktop-installer-macos-arm64-lite-pkg", out: "mac_arm64_lite_pkg" },
              { runId: macosRunId, name: "desktop-installer-macos-arm64-full-pkg", out: "mac_arm64_full_pkg" }
            ];

            for (const a of artifactsToFind) {
              const id = await safeFindArtifactId(a.runId, a.name);
              if (id) core.setOutput(a.out, id);
            }

      - name: Download raw artifact zips (no repack)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p release-assets

          download_artifact() {
            local id="$1"
            local name="$2"
            if [ -n "$id" ]; then
              curl -L \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${id}/zip" \
                -o "release-assets/${name}.zip"
            fi
          }

          v="${{ steps.release_meta.outputs.version }}"
          r="${{ steps.release_meta.outputs.release_type }}"
          
          download_artifact "${{ steps.resolve_runs.outputs.linux_portable_full }}" "seal-desktop-linux-x64-portable-full-v${v}-${r}"
          
          download_artifact "${{ steps.resolve_runs.outputs.win_portable_full }}" "seal-desktop-windows-x64-portable-full-v${v}-${r}"
          
          download_artifact "${{ steps.resolve_runs.outputs.mac_x64_portable_full }}" "seal-desktop-macos-x64-portable-full-v${v}-${r}"
          download_artifact "${{ steps.resolve_runs.outputs.mac_arm64_portable_full }}" "seal-desktop-macos-arm64-portable-full-v${v}-${r}"

          download_artifact "${{ steps.resolve_runs.outputs.linux_lite_deb }}" "seal-desktop-linux-x64-installer-lite-v${v}-${r}-deb"
          download_artifact "${{ steps.resolve_runs.outputs.linux_full_deb }}" "seal-desktop-linux-x64-installer-full-v${v}-${r}-deb"
          download_artifact "${{ steps.resolve_runs.outputs.linux_lite_rpm }}" "seal-desktop-linux-x64-installer-lite-v${v}-${r}-rpm"
          download_artifact "${{ steps.resolve_runs.outputs.linux_full_rpm }}" "seal-desktop-linux-x64-installer-full-v${v}-${r}-rpm"
          
          download_artifact "${{ steps.resolve_runs.outputs.win_lite_exe }}" "seal-desktop-windows-x64-installer-lite-v${v}-${r}-exe"
          download_artifact "${{ steps.resolve_runs.outputs.win_full_exe }}" "seal-desktop-windows-x64-installer-full-v${v}-${r}-exe"
          
          download_artifact "${{ steps.resolve_runs.outputs.mac_x64_lite_pkg }}" "seal-desktop-macos-x64-installer-lite-v${v}-${r}-pkg"
          download_artifact "${{ steps.resolve_runs.outputs.mac_x64_full_pkg }}" "seal-desktop-macos-x64-installer-full-v${v}-${r}-pkg"
          
          download_artifact "${{ steps.resolve_runs.outputs.mac_arm64_lite_pkg }}" "seal-desktop-macos-arm64-installer-lite-v${v}-${r}-pkg"
          download_artifact "${{ steps.resolve_runs.outputs.mac_arm64_full_pkg }}" "seal-desktop-macos-arm64-installer-full-v${v}-${r}-pkg"

      - name: Publish to GitHub Release (workflow_dispatch)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.release_meta.outputs.version }}
          name: v${{ steps.release_meta.outputs.version }}
          prerelease: ${{ steps.release_meta.outputs.release_type == 'prerelease' }}
          make_latest: ${{ steps.release_meta.outputs.release_type == 'stable' }}
          body: |
            <!-- manual-release -->
          generate_release_notes: true
          files: |
            release-assets/*.zip

      - name: Upload assets to existing release (release event)
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.release_meta.outputs.version }}
          prerelease: ${{ steps.release_meta.outputs.release_type == 'prerelease' }}
          make_latest: ${{ steps.release_meta.outputs.release_type == 'stable' }}
          files: |
            release-assets/*.zip
