name: desktop-macos-portable

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  TOOLS_CACHE_VERSION: v3
  YT_DLP_MACOS_URL: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos

jobs:
  build-macos-portable:
    strategy:
      matrix:
        include:
          - arch: x64
            os: macos-15-intel
            ffmpeg_url: https://www.osxexperts.net/ffmpeg80intel.zip
            ffprobe_url: https://www.osxexperts.net/ffprobe80intel.zip
          - arch: arm64
            os: macos-15
            ffmpeg_url: https://www.osxexperts.net/ffmpeg81arm.zip
            ffprobe_url: https://www.osxexperts.net/ffprobe81arm.zip
            
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Cache tools (yt-dlp/ffmpeg)
        uses: actions/cache@v5
        with:
          path: dist-bin
          key: tools-${{ runner.os }}-${{ matrix.arch }}-${{ env.TOOLS_CACHE_VERSION }}

      - name: Download yt-dlp (macOS universal)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "dist-bin/yt-dlp_macos" ]; then
            echo "yt-dlp cache hit"
            exit 0
          fi

          download_with_retry() {
            local url="$1"
            local output="$2"
            curl --fail --retry 3 --retry-delay 2 --retry-all-errors -L "$url" -o "$output"
          }

          mkdir -p dist-bin
          download_with_retry "$YT_DLP_MACOS_URL" dist-bin/yt-dlp_macos
          chmod +x dist-bin/yt-dlp_macos

      - name: Download FFmpeg & FFprobe (macOS ${{ matrix.arch }})
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "dist-bin/ffmpeg" ] && [ -f "dist-bin/ffprobe" ]; then
            echo "ffmpeg cache hit"
            exit 0
          fi

          download_with_retry() {
            local url="$1"
            local output="$2"
            curl --fail --retry 3 --retry-delay 2 --retry-all-errors -L "$url" -o "$output"
          }

          extract_binary() {
            local zip_path="$1"
            local binary_name="$2"
            local tmp_dir
            local candidate

            tmp_dir="$(mktemp -d)"
            unzip -o "$zip_path" -d "$tmp_dir" >/dev/null
            candidate="$(find "$tmp_dir" -type f -name "$binary_name" | head -n 1 || true)"

            if [ -z "$candidate" ]; then
              rm -rf "$tmp_dir"
              return 1
            fi

            cp "$candidate" "dist-bin/$binary_name"
            chmod +x "dist-bin/$binary_name"
            rm -rf "$tmp_dir"
            return 0
          }

          mkdir -p dist-bin
          
          echo "Downloading FFmpeg from ${{ matrix.ffmpeg_url }}"
          download_with_retry "${{ matrix.ffmpeg_url }}" dist-bin/ffmpeg.zip
          extract_binary dist-bin/ffmpeg.zip ffmpeg

          echo "Downloading FFprobe from ${{ matrix.ffprobe_url }}"
          download_with_retry "${{ matrix.ffprobe_url }}" dist-bin/ffprobe.zip
          extract_binary dist-bin/ffprobe.zip ffprobe

          rm -f dist-bin/ffmpeg.zip dist-bin/ffprobe.zip

      - name: Build Lite installers (macOS ${{ matrix.arch }})
        shell: bash
        run: |
          ./gradlew :desktop:createReleaseDistributable --stacktrace
          ./gradlew :desktop:packageReleaseDistributionForCurrentOS --stacktrace
          
          mkdir -p dist-installers-lite
          cp desktop/build/compose/binaries/main-release/dmg/*.dmg dist-installers-lite/ || true
          cp desktop/build/compose/binaries/main-release/pkg/*.pkg dist-installers-lite/ || true

      - name: Inject tools for Full version
        shell: bash
        run: |
          mkdir -p desktop/appResources/macos
          cp dist-bin/* desktop/appResources/macos/ || true
          rm -rf desktop/build/compose/binaries desktop/build/compose/tmp

      - name: Build Full installers and portable (macOS ${{ matrix.arch }})
        shell: bash
        run: |
          ./gradlew :desktop:createReleaseDistributable --rerun-tasks --stacktrace
          ./gradlew :desktop:packageReleaseDistributionForCurrentOS --rerun-tasks --stacktrace
          ./gradlew :desktop:packageUberJarForCurrentOS --stacktrace
          
          mkdir -p dist-installers-full
          cp desktop/build/compose/binaries/main-release/dmg/*.dmg dist-installers-full/ || true
          cp desktop/build/compose/binaries/main-release/pkg/*.pkg dist-installers-full/ || true

      - name: Print jpackage logs on failure
        if: failure()
        shell: bash
        run: |
          set +e
          log_dir="desktop/build/compose/logs/createReleaseDistributable"
          if [ -d "$log_dir" ]; then
            echo "=== jpackage logs under $log_dir ==="
            ls -lah "$log_dir"
            for f in "$log_dir"/*.txt; do
              [ -e "$f" ] || continue
              echo "----- $f (tail -n 200) -----"
              tail -n 200 "$f"
            done
          else
            echo "No jpackage log directory found: $log_dir"
          fi

      - name: Prepare Full, Lite, Min distributions (macOS ${{ matrix.arch }})
        shell: bash
        run: |
          set -euo pipefail
          workspace="$GITHUB_WORKSPACE"
          desktop_build="$workspace/desktop/build"
          
          if [ ! -d "$desktop_build" ]; then
            echo "Build directory not found: $desktop_build"
            exit 1
          fi



          # Locate app bundle
          app_bundle=$(find "$desktop_build/compose/binaries" -type d -name "*.app" | head -n 1 || true)
          if [ -z "$app_bundle" ] || [ ! -d "$app_bundle" ]; then
            echo "Cannot locate macOS .app bundle under $desktop_build/compose/binaries"
            exit 1
          fi
          echo "Resolved app bundle: $app_bundle"
          
          # Portable
          mkdir -p "$workspace/dist-portable"
          cp -R "$app_bundle" "$workspace/dist-portable/"
          echo "PORTABLE_DIR=$workspace/dist-portable" >> "$GITHUB_ENV"

      - name: Upload Portable Full artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-portable-macos-${{ matrix.arch }}-full
          path: ${{ env.PORTABLE_DIR }}

      - name: Upload Lite DMG Installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-installer-macos-${{ matrix.arch }}-lite-dmg
          path: dist-installers-lite/*.dmg

      - name: Upload Full DMG Installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-installer-macos-${{ matrix.arch }}-full-dmg
          path: dist-installers-full/*.dmg

      - name: Upload Lite PKG Installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-installer-macos-${{ matrix.arch }}-lite-pkg
          path: dist-installers-lite/*.pkg

      - name: Upload Full PKG Installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: desktop-installer-macos-${{ matrix.arch }}-full-pkg
          path: dist-installers-full/*.pkg
