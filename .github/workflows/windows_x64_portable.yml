name: desktop-windows-portable

on:
  workflow_dispatch:
    inputs:
      debug_launcher:
        description: "Build Windows installers with cmd debug launcher and visible console"
        required: false
        type: boolean
        default: false
  push:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TOOLS_CACHE_VERSION: v2
  YT_DLP_URL: https://github.com/yt-dlp/yt-dlp-nightly-builds/releases/latest/download/yt-dlp.exe
  FFMPEG_URL: https://github.com/yt-dlp/FFmpeg-Builds/releases/latest/download/ffmpeg-master-latest-win64-gpl.zip
  GITHUB_TOKEN: ${{ secrets.JB_TOKEN }}
  DESKTOP_WINDOWS_DEBUG_LAUNCHER: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_launcher && '1' || '0' }}

jobs:
  build-windows-portable:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: 21
          cache: gradle

      - name: Resolve desktop versions
        shell: bash
        run: |
          package_version="$(./gradlew -q :desktop:printDesktopPackageVersion)"
          version_name="$(./gradlew -q :desktop:printDesktopVersionName)"
          echo "DESKTOP_PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"
          echo "DESKTOP_VERSION_NAME=$version_name" >> "$GITHUB_ENV"
          echo "Desktop package version: $package_version"
          echo "Desktop version name: $version_name"
          echo "Windows debug launcher: $DESKTOP_WINDOWS_DEBUG_LAUNCHER"

      - name: Set tools cache epoch
        shell: bash
        run: echo "TOOLS_CACHE_EPOCH=$(date -u +%G-W%V)" >> "$GITHUB_ENV"

      - name: Cache tools (yt-dlp/ffmpeg)
        uses: actions/cache@v5
        with:
          path: |
            dist-bin
            ffmpeg-unpacked
          key: tools-${{ runner.os }}-${{ env.TOOLS_CACHE_EPOCH }}-${{ env.TOOLS_CACHE_VERSION }}

      - name: Download yt-dlp (x64)
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path "dist-bin/yt-dlp.exe") {
            Write-Host "yt-dlp cache hit: dist-bin/yt-dlp.exe"
            exit 0
          }
          curl.exe --fail --retry 3 --retry-delay 2 --retry-all-errors -L "$env:YT_DLP_URL" -o yt-dlp.exe
          mkdir -Force dist-bin
          mv yt-dlp.exe dist-bin/

      - name: Download FFmpeg (x64)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          if (Test-Path "dist-bin/ffmpeg.exe") {
            Write-Host "ffmpeg cache hit: dist-bin/ffmpeg.exe"
            exit 0
          }
          $url = "$env:FFMPEG_URL"
          Write-Host "Downloading FFmpeg from: $url"
          curl.exe --fail --retry 3 --retry-delay 2 --retry-all-errors -L $url -o ffmpeg.zip

          $outDir = Join-Path "$env:GITHUB_WORKSPACE" "ffmpeg-unpacked"
          if (Test-Path $outDir) { Remove-Item $outDir -Recurse -Force }
          Expand-Archive -Path ffmpeg.zip -DestinationPath $outDir -Force

          $ffmpegExe = Get-ChildItem $outDir -Recurse -File -Filter ffmpeg.exe | Select-Object -First 1
          $ffprobeExe = Get-ChildItem $outDir -Recurse -File -Filter ffprobe.exe | Select-Object -First 1
          if (-not $ffmpegExe) { throw "ffmpeg.exe not found in downloaded archive" }

          mkdir -Force dist-bin | Out-Null
          Copy-Item $ffmpegExe.FullName -Destination (Join-Path "dist-bin" "ffmpeg.exe") -Force
          if ($ffprobeExe) {
            Copy-Item $ffprobeExe.FullName -Destination (Join-Path "dist-bin" "ffprobe.exe") -Force
          }

      # 如需 x86/arm64 可再加下载，改文件名存放到 dist-bin/ 并在后续打包时挑选
      # - name: Download yt-dlp (arm64)
      #   run: curl -L ".../yt-dlp_arm64.exe" -o dist-bin/yt-dlp_arm64.exe

      - name: Build Lite distributable (Windows)
        run: |
          debug_args=()
          if [[ "$DESKTOP_WINDOWS_DEBUG_LAUNCHER" == "1" ]]; then
            debug_args+=("-PdesktopWindowsDebugLauncher=true")
            debug_args+=("-PdesktopReleaseProguard=false")
          fi
          ./gradlew :desktop:createReleaseDistributable --stacktrace "${debug_args[@]}"
        shell: bash

      - name: Stage Lite installer source (Windows)
        shell: pwsh
        run: |
          $params = @{
            Workspace = "$env:GITHUB_WORKSPACE"
            StageDir = "$env:GITHUB_WORKSPACE\dist-stage-lite"
            EnvName = "LITE_INSTALLER_SRC"
          }
          if ($env:DESKTOP_WINDOWS_DEBUG_LAUNCHER -eq "1") {
            $params.DebugLauncher = $true
          }
          & "$env:GITHUB_WORKSPACE\.github\scripts\stage_windows_installer_source.ps1" @params

      - name: Package Lite installer (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\dist-installers-lite" | Out-Null
          Write-Host "Lite installer source: $env:LITE_INSTALLER_SRC"
          Write-Host "Lite installer launch path: $env:LITE_INSTALLER_SRC_LAUNCH_PATH"
          if (-not (Test-Path (Join-Path "$env:LITE_INSTALLER_SRC" "$env:LITE_INSTALLER_SRC_LAUNCH_PATH"))) {
            throw "Lite installer launch target not found: $env:LITE_INSTALLER_SRC_LAUNCH_PATH"
          }
          $isccArgs = @(
            "/DMyAppVersion=$env:DESKTOP_VERSION_NAME",
            "/DMyAppArch=x64",
            "/DMyAppFlavor=Lite",
            "/DMyAppSrc=$env:LITE_INSTALLER_SRC",
            "/DMyAppLaunchPath=$env:LITE_INSTALLER_SRC_LAUNCH_PATH",
            "/DMyAppOutput=$env:GITHUB_WORKSPACE\dist-installers-lite"
          )
          if ($env:DESKTOP_WINDOWS_DEBUG_LAUNCHER -eq "1") {
            $isccArgs += "/DMyAppLaunchThroughCmd=1"
          }
          & iscc @isccArgs ".github/scripts/windows_setup.iss"

      - name: Inject tools for Full version
        shell: bash
        run: |
          mkdir -p desktop/appResources/windows
          cp dist-bin/* desktop/appResources/windows/ || true
          rm -rf desktop/build/compose/binaries desktop/build/compose/tmp

      - name: Build Full distributable and portable jar (Windows)
        run: |
          debug_args=()
          if [[ "$DESKTOP_WINDOWS_DEBUG_LAUNCHER" == "1" ]]; then
            debug_args+=("-PdesktopWindowsDebugLauncher=true")
            debug_args+=("-PdesktopReleaseProguard=false")
          fi
          ./gradlew :desktop:createReleaseDistributable --stacktrace "${debug_args[@]}"
          ./gradlew :desktop:packageUberJarForCurrentOS --stacktrace
        shell: bash

      - name: Stage Full installer source (Windows)
        shell: pwsh
        run: |
          $params = @{
            Workspace = "$env:GITHUB_WORKSPACE"
            StageDir = "$env:GITHUB_WORKSPACE\dist-stage-full"
            EnvName = "FULL_INSTALLER_SRC"
          }
          if ($env:DESKTOP_WINDOWS_DEBUG_LAUNCHER -eq "1") {
            $params.DebugLauncher = $true
          }
          & "$env:GITHUB_WORKSPACE\.github\scripts\stage_windows_installer_source.ps1" @params

      - name: Package Full installer (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\dist-installers-full" | Out-Null
          Write-Host "Full installer source: $env:FULL_INSTALLER_SRC"
          Write-Host "Full installer launch path: $env:FULL_INSTALLER_SRC_LAUNCH_PATH"
          if (-not (Test-Path (Join-Path "$env:FULL_INSTALLER_SRC" "$env:FULL_INSTALLER_SRC_LAUNCH_PATH"))) {
            throw "Full installer launch target not found: $env:FULL_INSTALLER_SRC_LAUNCH_PATH"
          }
          $isccArgs = @(
            "/DMyAppVersion=$env:DESKTOP_VERSION_NAME",
            "/DMyAppArch=x64",
            "/DMyAppFlavor=Full",
            "/DMyAppSrc=$env:FULL_INSTALLER_SRC",
            "/DMyAppLaunchPath=$env:FULL_INSTALLER_SRC_LAUNCH_PATH",
            "/DMyAppOutput=$env:GITHUB_WORKSPACE\dist-installers-full"
          )
          if ($env:DESKTOP_WINDOWS_DEBUG_LAUNCHER -eq "1") {
            $isccArgs += "/DMyAppLaunchThroughCmd=1"
          }
          & iscc @isccArgs ".github/scripts/windows_setup.iss"

      - name: Prepare Full, Lite, Min distributions (Windows)
        shell: pwsh
        run: |
          $workspace = "$env:GITHUB_WORKSPACE"
          $appRoot = "$env:FULL_INSTALLER_SRC"
          if (-not $appRoot -or -not (Test-Path $appRoot)) {
            throw "Full installer source was not staged before portable packaging."
          }

          # Portable
          $portableDir = Join-Path $workspace "dist-portable\app"
          if (Test-Path $portableDir) {
            Remove-Item $portableDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item "$appRoot\*" -Destination $portableDir -Recurse -Force
          "PORTABLE_DIR=$portableDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Print Windows package sizes
        shell: pwsh
        run: |
          function Format-Size([long]$bytes) {
            if ($bytes -ge 1GB) { return "{0:N2} GB" -f ($bytes / 1GB) }
            if ($bytes -ge 1MB) { return "{0:N2} MB" -f ($bytes / 1MB) }
            if ($bytes -ge 1KB) { return "{0:N2} KB" -f ($bytes / 1KB) }
            return "$bytes B"
          }

          $paths = @(
            "dist-installers-lite",
            "dist-installers-full",
            "dist-stage-lite",
            "dist-stage-full",
            "dist-portable"
          )
          foreach ($path in $paths) {
            if (Test-Path $path) {
              $bytes = (Get-ChildItem $path -Recurse -File | Measure-Object -Property Length -Sum).Sum
              Write-Host ("{0}: {1}" -f $path, (Format-Size $bytes))
            }
          }

          if (Test-Path "dist-stage-full") {
            Write-Host "Top files in dist-stage-full:"
            Get-ChildItem "dist-stage-full" -Recurse -File |
              Sort-Object Length -Descending |
              Select-Object -First 20 FullName, @{Name="Size";Expression={Format-Size $_.Length}} |
              Format-Table -AutoSize
          }

      - name: Upload Portable Full artifact
        uses: actions/upload-artifact@v6
        with:
          name: desktop-portable-win-x64-full
          path: ${{ env.PORTABLE_DIR }}
          if-no-files-found: error
          compression-level: 9
          retention-days: 20

      - name: Upload Lite EXE Installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: desktop-installer-win-x64-lite-exe
          path: dist-installers-lite/*.exe
          if-no-files-found: error
          compression-level: 0
          retention-days: 20

      - name: Upload Full EXE Installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: desktop-installer-win-x64-full-exe
          path: dist-installers-full/*.exe
          if-no-files-found: error
          compression-level: 0
          retention-days: 20
