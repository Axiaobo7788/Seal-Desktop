name: desktop-macos-portable

on:
  workflow_dispatch:
  push:
    branches: [ main ]

env:
  TOOLS_CACHE_VERSION: v2
  YT_DLP_MACOS_URL: https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos
  FFMPEG_MACOS_URL: https://evermeet.cx/ffmpeg/getrelease/zip
  FFPROBE_MACOS_URL: https://evermeet.cx/ffprobe/getrelease/zip
  FFPROBE_MACOS_FALLBACK_URL: https://www.osxexperts.net/ffprobe711arm.zip

jobs:
  build-macos-portable:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Cache tools (yt-dlp/ffmpeg)
        uses: actions/cache@v4
        with:
          path: dist-bin
          key: tools-${{ runner.os }}-${{ env.TOOLS_CACHE_VERSION }}

      - name: Download yt-dlp (macOS universal)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "dist-bin/yt-dlp_macos" ]; then
            echo "yt-dlp cache hit"
            exit 0
          fi

          download_with_retry() {
            local url="$1"
            local output="$2"

            curl --fail --retry 3 --retry-delay 2 --retry-all-errors -L "$url" -o "$output"
          }

          mkdir -p dist-bin
          download_with_retry "$YT_DLP_MACOS_URL" dist-bin/yt-dlp_macos
          chmod +x dist-bin/yt-dlp_macos

      - name: Download FFmpeg & FFprobe (macOS x64 static)
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "dist-bin/ffmpeg" ] && [ -f "dist-bin/ffprobe" ]; then
            echo "ffmpeg cache hit"
            exit 0
          fi

          download_with_retry() {
            local url="$1"
            local output="$2"

            curl --fail --retry 3 --retry-delay 2 --retry-all-errors -L "$url" -o "$output"
          }

          extract_binary() {
            local zip_path="$1"
            local binary_name="$2"
            local tmp_dir
            local candidate

            tmp_dir="$(mktemp -d)"
            unzip -o "$zip_path" -d "$tmp_dir" >/dev/null
            candidate="$(find "$tmp_dir" -type f -name "$binary_name" | head -n 1 || true)"

            if [ -z "$candidate" ]; then
              rm -rf "$tmp_dir"
              return 1
            fi

            cp "$candidate" "dist-bin/$binary_name"
            chmod +x "dist-bin/$binary_name"
            rm -rf "$tmp_dir"
            return 0
          }

          mkdir -p dist-bin
          download_with_retry "$FFMPEG_MACOS_URL" dist-bin/ffmpeg.zip
          extract_binary dist-bin/ffmpeg.zip ffmpeg

          download_with_retry "$FFPROBE_MACOS_URL" dist-bin/ffprobe.zip
          if ! extract_binary dist-bin/ffprobe.zip ffprobe; then
            echo "Primary ffprobe archive did not contain ffprobe, trying fallback URL"
            download_with_retry "$FFPROBE_MACOS_FALLBACK_URL" dist-bin/ffprobe_fallback.zip
            extract_binary dist-bin/ffprobe_fallback.zip ffprobe
          fi

          rm -f dist-bin/ffmpeg.zip dist-bin/ffprobe.zip dist-bin/ffprobe_fallback.zip

      - name: Build distributable (macOS)
        shell: bash
        run: |
          ./gradlew :desktop:createReleaseDistributable --stacktrace

      - name: Print jpackage logs on failure
        if: failure()
        shell: bash
        run: |
          set +e
          log_dir="desktop/build/compose/logs/createReleaseDistributable"
          if [ -d "$log_dir" ]; then
            echo "=== jpackage logs under $log_dir ==="
            ls -lah "$log_dir"
            for f in "$log_dir"/*.txt; do
              [ -e "$f" ] || continue
              echo "----- $f (tail -n 200) -----"
              tail -n 200 "$f"
            done
          else
            echo "No jpackage log directory found: $log_dir"
          fi

      - name: Inject tools into .app bundle
        shell: bash
        run: |
          set -euo pipefail
          workspace="$GITHUB_WORKSPACE"
          desktop_build="$workspace/desktop/build"
          
          if [ ! -d "$desktop_build" ]; then
            echo "Build directory not found: $desktop_build"
            exit 1
          fi

          app_bundle=$(find "$desktop_build/compose/binaries" -type d -name "*.app" | head -n 1 || true)
          if [ -z "$app_bundle" ] || [ ! -d "$app_bundle" ]; then
            echo "Cannot locate macOS .app bundle under $desktop_build/compose/binaries"
            exit 1
          fi
          
          echo "Resolved app bundle: $app_bundle"
          bin_dir="$app_bundle/Contents/bin"
          mkdir -p "$bin_dir"
          
          cp "$workspace/dist-bin/yt-dlp_macos" "$bin_dir/yt-dlp_macos"
          if [ -f "$workspace/dist-bin/ffmpeg" ]; then
            cp "$workspace/dist-bin/ffmpeg" "$bin_dir/ffmpeg"
          fi
          if [ -f "$workspace/dist-bin/ffprobe" ]; then
            cp "$workspace/dist-bin/ffprobe" "$bin_dir/ffprobe"
          fi

          echo "PORTABLE_DIR=$app_bundle" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-portable-macos
          path: ${{ env.PORTABLE_DIR }}